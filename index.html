<!DOCTYPE html>
<html>
<head>
  <title>Mumbai Flood Risk Dashboard</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #navbar {
      background: #0f172a;
      color: white;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e293b;
      z-index: 1000;
    }
    #navbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
    }
    .live-badge {
      font-size: 10px;
      font-weight: 600;
      background: #1e3a5f;
      color: #60a5fa;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.06em;
    }
    #navbar .meta {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 12px;
      color: #64748b;
    }
    #navbar .meta span { display: flex; align-items: center; gap: 5px; }

    #stats-bar {
      background: #1e293b;
      display: flex;
      flex-shrink: 0;
      border-bottom: 1px solid #334155;
    }
    .stat-card {
      flex: 1;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-right: 1px solid #334155;
    }
    .stat-card:last-child { border-right: none; }
    .stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .stat-card .stat-num { font-size: 20px; font-weight: 600; color: white; line-height: 1; }
    .stat-card .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
    .stat-icon { color: #60a5fa; flex-shrink: 0; }

    #body { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; z-index: 1; }

    #sidebar {
      width: 280px;
      background: #ffffff;
      border-left: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      z-index: 500;
    }

    .sidebar-section { padding: 16px; border-bottom: 1px solid #f1f5f9; }
    .sidebar-section:last-child { border-bottom: none; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    #ward-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    #ward-name { font-size: 22px; font-weight: 700; color: #0f172a; line-height: 1; }
    #ward-area { font-size: 12px; color: #64748b; margin-top: 4px; }

    .risk-badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .badge-high   { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    .badge-medium { background: #fffbeb; color: #b45309; border: 1px solid #fcd34d; }
    .badge-low    { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }

    #rainfall-num { font-size: 36px; font-weight: 700; color: #0f172a; line-height: 1; }
    #rainfall-num span { font-size: 16px; font-weight: 400; color: #64748b; margin-left: 4px; }
    .rain-bar-bg { margin-top: 10px; background: #f1f5f9; border-radius: 4px; height: 6px; overflow: hidden; }
    #rain-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .rain-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: #94a3b8; margin-top: 4px; }

    #advisory-box { border-radius: 8px; padding: 10px 12px; font-size: 12px; line-height: 1.5; border: 1px solid; }
    .advisory-high   { background: #fef2f2; color: #7f1d1d; border-color: #fca5a5; }
    .advisory-medium { background: #fffbeb; color: #78350f; border-color: #fcd34d; }
    .advisory-low    { background: #f0fdf4; color: #14532d; border-color: #86efac; }

    #ward-list-container { flex: 1; overflow-y: auto; }
    #ward-list { display: flex; flex-direction: column; gap: 4px; padding: 0 16px 16px; }

    .ward-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s;
    }
    .ward-row:hover { opacity: 0.85; }
    .ward-row .ward-row-name { font-size: 13px; font-weight: 600; }
    .ward-row .ward-row-mm  { font-size: 11px; }
    .ward-row-high   { background: #fef2f2; border-color: #fca5a5; }
    .ward-row-high .ward-row-name { color: #7f1d1d; }
    .ward-row-high .ward-row-mm   { color: #b91c1c; }
    .ward-row-medium { background: #fffbeb; border-color: #fcd34d; }
    .ward-row-medium .ward-row-name { color: #78350f; }
    .ward-row-medium .ward-row-mm   { color: #b45309; }
    .ward-row-low    { background: #f0fdf4; border-color: #86efac; }
    .ward-row-low .ward-row-name { color: #14532d; }
    .ward-row-low .ward-row-mm   { color: #15803d; }
    .ward-row.active { outline: 2px solid #3b82f6; outline-offset: -1px; }

    #ward-placeholder { text-align: center; color: #94a3b8; font-size: 13px; padding: 20px 0; }

    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  </style>
</head>
<body>

  <div id="navbar">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/>
        <line x1="8" y1="16" x2="8.01" y2="16"/>
        <line x1="8" y1="20" x2="8.01" y2="20"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
        <line x1="12" y1="22" x2="12.01" y2="22"/>
        <line x1="16" y1="16" x2="16.01" y2="16"/>
        <line x1="16" y1="20" x2="16.01" y2="20"/>
      </svg>
      Mumbai Flood Risk Dashboard
      <span class="live-badge">LIVE</span>
    </div>
    <div class="meta">
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Updated <span id="updated-time">—</span>
      </span>
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh in <span id="refresh-countdown">30m</span>
      </span>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat-card">
      <div class="stat-dot" style="background:#ef4444;"></div>
      <div>
        <div class="stat-num" id="high-count">—</div>
        <div class="stat-label">High risk wards</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-dot" style="background:#f59e0b;"></div>
      <div>
        <div class="stat-num" id="medium-count">—</div>
        <div class="stat-label">Medium risk wards</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-dot" style="background:#22c55e;"></div>
      <div>
        <div class="stat-num" id="low-count">—</div>
        <div class="stat-label">Low risk wards</div>
      </div>
    </div>
    <div class="stat-card">
      <svg class="stat-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6m0 0C9.5 8 7 10.5 7 14a5 5 0 0 0 10 0c0-3.5-2.5-6-5-6z"/></svg>
      <div>
        <div class="stat-num" id="max-rain">—</div>
        <div class="stat-label">Max rainfall (1hr)</div>
      </div>
    </div>
  </div>

  <div id="body">
    <div id="map"></div>

    <div id="sidebar">
      <div class="sidebar-section" id="ward-detail-section">
        <div class="section-label">Selected ward</div>
        <div id="ward-placeholder">Click a ward on the map</div>
        <div id="ward-detail" style="display:none;">
          <div id="ward-header">
            <div>
              <div id="ward-name">—</div>
              <div id="ward-area">—</div>
            </div>
            <span id="risk-badge" class="risk-badge">—</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section" id="rainfall-section" style="display:none;">
        <div class="section-label">Rainfall — last 1 hour</div>
        <div id="rainfall-num">0<span>mm</span></div>
        <div class="rain-bar-bg">
          <div id="rain-bar-fill" style="width:0%; background:#22c55e;"></div>
        </div>
        <div class="rain-bar-labels"><span>0mm</span><span>20mm</span><span>40mm+</span></div>
      </div>

      <div class="sidebar-section" id="advisory-section" style="display:none;">
        <div class="section-label">Advisory</div>
        <div id="advisory-box">—</div>
      </div>

      <div class="sidebar-section" style="padding-bottom:8px;">
        <div class="section-label">All wards</div>
      </div>
      <div id="ward-list-container">
        <div id="ward-list"></div>
      </div>
    </div>
  </div>

  <script>
    const map = L.map('map').setView([19.0760, 72.8777], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const wardNames = {
      "A":   "Colaba, Fort, Nariman Point",
      "B":   "Mandvi, Masjid",
      "C":   "Girgaon, Marine Lines",
      "D":   "Malabar Hill, Walkeshwar",
      "E":   "Byculla, Mazagaon",
      "F/S": "Dadar, Prabhadevi",
      "F/N": "Andheri West (South)",
      "G/S": "Dharavi, Mahim",
      "G/N": "Vile Parle, Santacruz West",
      "H/E": "Bandra East, Kurla West",
      "H/W": "Bandra West",
      "K/E": "Andheri East, Jogeshwari East",
      "K/W": "Andheri West, Jogeshwari West",
      "L":   "Kurla, Vidyavihar",
      "M/E": "Chembur East",
      "M/W": "Chembur West, Govandi",
      "N":   "Ghatkopar, Vikhroli",
      "P/N": "Goregaon, Malad East",
      "P/S": "Goregaon West, Malad West",
      "R/C": "Dahisar, Borivali East",
      "R/N": "Dahisar North",
      "R/S": "Borivali West",
      "S":   "Bhandup, Mulund",
      "T":   "Mulund East"
    };

    const adviceText = {
      "high":   "⚠️ Avoid low-lying areas. Do not enter flooded roads. Stay indoors if possible.",
      "medium": "🟡 Stay alert. Monitor updates closely. Avoid waterlogged streets.",
      "low":    "✅ No immediate risk. Stay informed and check back during heavy rain."
    };

    function getColor(risk) {
      if (risk === "high")   return "#ef4444";
      if (risk === "medium") return "#f59e0b";
      return "#22c55e";
    }

    let wardLayers = {};

    function showWardDetail(ward, info) {
      const risk = info.risk;
      const mm   = info.rainfall_mm ?? 0;

      document.getElementById("ward-placeholder").style.display = "none";
      document.getElementById("ward-detail").style.display = "block";
      document.getElementById("rainfall-section").style.display = "block";
      document.getElementById("advisory-section").style.display = "block";

      document.getElementById("ward-name").textContent = "Ward " + ward;
      document.getElementById("ward-area").textContent = wardNames[ward] || "";

      const badge = document.getElementById("risk-badge");
      badge.textContent = risk.toUpperCase();
      badge.className = "risk-badge badge-" + risk;

      document.getElementById("rainfall-num").innerHTML = mm.toFixed(1) + "<span>mm</span>";

      const pct = Math.min((mm / 40) * 100, 100);
      document.getElementById("rain-bar-fill").style.width = pct + "%";
      document.getElementById("rain-bar-fill").style.background = getColor(risk);

      const advisory = document.getElementById("advisory-box");
      advisory.textContent = adviceText[risk];
      advisory.className = "advisory-" + risk;

      document.querySelectorAll(".ward-row").forEach(r => r.classList.remove("active"));
      const row = document.getElementById("row-" + ward.replace("/", "_"));
      if (row) { row.classList.add("active"); row.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
    }

    fetch('/risk')
      .then(res => res.json())
      .then(riskData => {

        let high = 0, medium = 0, low = 0, maxMm = 0;
        for (const ward in riskData) {
          const r  = riskData[ward].risk;
          const mm = riskData[ward].rainfall_mm ?? 0;
          if (r === "high") high++;
          else if (r === "medium") medium++;
          else low++;
          if (mm > maxMm) maxMm = mm;
        }
        document.getElementById("high-count").textContent   = high;
        document.getElementById("medium-count").textContent = medium;
        document.getElementById("low-count").textContent    = low;
        document.getElementById("max-rain").textContent     = maxMm.toFixed(1) + "mm";
        document.getElementById("updated-time").textContent = new Date().toLocaleTimeString();

        const sorted = Object.keys(riskData).sort((a, b) => {
          const order = { high: 0, medium: 1, low: 2 };
          const diff = order[riskData[a].risk] - order[riskData[b].risk];
          return diff !== 0 ? diff : a.localeCompare(b);
        });

        const list = document.getElementById("ward-list");
        sorted.forEach(ward => {
          const info = riskData[ward];
          const risk = info.risk;
          const mm   = info.rainfall_mm ?? 0;
          const row  = document.createElement("div");
          row.className  = "ward-row ward-row-" + risk;
          row.id         = "row-" + ward.replace("/", "_");
          row.innerHTML  = `<span class="ward-row-name">${ward}</span><span class="ward-row-mm">${mm.toFixed(1)}mm</span>`;
          row.addEventListener("click", () => {
            showWardDetail(ward, info);
            if (wardLayers[ward]) map.fitBounds(wardLayers[ward].getBounds(), { padding: [40, 40] });
          });
          list.appendChild(row);
        });

        fetch('/BMC_admin_wards.geojson')
          .then(res => res.json())
          .then(geoData => {
            L.geoJSON(geoData, {
              style: function(feature) {
                const ward = feature.properties.name || "";
                const risk = riskData[ward]?.risk || "low";
                return { fillColor: getColor(risk), fillOpacity: 0.55, color: "white", weight: 2 };
              },
              onEachFeature: function(feature, layer) {
                const ward     = feature.properties.name || "Unknown";
                const info     = riskData[ward];
                const risk     = info?.risk || "low";
                const mm       = info?.rainfall_mm ?? 0;
                const fullName = wardNames[ward] || "";

                wardLayers[ward] = layer;

                layer.on("click", () => {
                  showWardDetail(ward, info || { risk: "low", rainfall_mm: 0 });
                });
                layer.on("mouseover", function() { layer.setStyle({ fillOpacity: 0.8, weight: 3 }); });
                layer.on("mouseout",  function() { layer.setStyle({ fillOpacity: 0.55, weight: 2 }); });

                layer.bindTooltip(`<b>Ward ${ward}</b><br>${fullName}<br>${mm.toFixed(1)}mm — ${risk.toUpperCase()}`, {
                  sticky: true
                });
              }
            }).addTo(map);
          });
      });

    const legend = L.control({ position: "bottomleft" });
    legend.onAdd = function() {
      const div = L.DomUtil.create("div");
      div.style.cssText = "background:white;padding:10px 14px;border-radius:8px;font-size:13px;font-family:-apple-system,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.15);";
      div.innerHTML = `
        <div style="font-weight:600;margin-bottom:8px;color:#0f172a;">Flood risk</div>
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;color:#374151;"><span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;"></span> High (&gt;20mm)</div>
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;color:#374151;"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span> Medium (5–20mm)</div>
        <div style="display:flex;align-items:center;gap:7px;color:#374151;"><span style="width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block;"></span> Low (&lt;5mm)</div>
      `;
      return div;
    };
    legend.addTo(map);

    let secsLeft = 30 * 60;
    setInterval(() => {
      secsLeft--;
      const m = Math.floor(secsLeft / 60);
      const s = secsLeft % 60;
      document.getElementById("refresh-countdown").textContent = m > 0 ? m + "m " + s + "s" : s + "s";
      if (secsLeft <= 0) location.reload();
    }, 1000);
  </script>
</body>
</html>
